<aside class="quick-summary" aria-label="Resumen de la venta">
  <header class="quick-summary__head">
    <p>Resumen de venta</p>
    <span>{{ productCount }} {{ productCount === 1 ? 'producto' : 'productos' }}</span>
  </header>

  <dl class="quick-summary__details">
    <div>
      <dt>Sucursal</dt>
      <dd>{{ branch }}</dd>
    </div>
    <div>
      <dt>Canal</dt>
      <dd>{{ channel }}</dd>
    </div>
    <div>
      <dt>Entrega</dt>
      <dd>{{ delivery }}</dd>
    </div>
    <div>
      <dt>Cliente</dt>
      <dd>{{ customer }}</dd>
    </div>
  </dl>

  <div class="quick-summary__total" aria-live="polite">
    <span>Total</span>
    <strong>{{ total | currency:'USD':'symbol':'1.2-2' }}</strong>
  </div>

  <button
    class="quick-summary__action"
    type="button"
    [disabled]="saving"
    (click)="handlePrimaryAction()">
    {{ actionLabel }}
    <span aria-hidden="true">→</span>
  </button>
</aside>
